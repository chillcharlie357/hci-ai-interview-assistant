# 开发模式覆盖：前后端源码热重载 + 调试日志
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Windows 用户需确保 WSL2 文件系统性能（建议项目放在 WSL2 内）

services:
  backend:
    volumes:
      - ./backend:/app/backend
    command: ["uv", "run", "watchfiles", "--filter", "python", "python -m backend.interview.api --host 0.0.0.0 --port 8000"]
    environment:
      DEBUG: "true"

  frontend:
    build:
      target: dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
      VITE_ASR_WS_URL: ${VITE_ASR_WS_URL:-ws://127.0.0.1:9785/}
      VITE_ASR_PROVIDER: ${VITE_ASR_PROVIDER:-qwen}
      VITE_REQUIRE_AUTH: ${VITE_REQUIRE_AUTH:-false}
      VITE_INTERVIEW_FILLER_WORDS: ${VITE_INTERVIEW_FILLER_WORDS:-}
      VITE_APP_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules

