services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      MINERU_COMMAND: ${MINERU_COMMAND:-mineru-open-api}
      MINERU_TIMEOUT_SEC: ${MINERU_TIMEOUT_SEC:-120}
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
      VITE_INTERVIEW_FILLER_WORDS: ${VITE_INTERVIEW_FILLER_WORDS:-嗯,啊,呃,额,那个,就是}
    depends_on:
      - backend
    ports:
      - "5173:5173"
