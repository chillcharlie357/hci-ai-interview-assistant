services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    ports:
      - "8100:8000"
    command: ["uv", "run", "python", "-m", "backend.interview.api", "--host", "0.0.0.0", "--port", "8000"]

  asr:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      ASR_WS_HOST: 0.0.0.0
      ASR_WS_PORT: "8765"
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
    command: ["uv", "run", "python", "-m", "backend.asr.qwen_realtime", "--host", "0.0.0.0", "--port", "8765"]
    ports:
      - "9785:8765"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file: .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8100}
      VITE_ASR_WS_URL: ${VITE_ASR_WS_URL:-ws://127.0.0.1:9785/}
      VITE_ASR_PROVIDER: ${VITE_ASR_PROVIDER:-qwen}
    depends_on:
      - backend
      - asr
    ports:
      - "5173:5173"
