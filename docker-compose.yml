services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: ["uv", "run", "python", "-m", "backend.interview.api", "--host", "0.0.0.0", "--port", "8000"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c 'import urllib.request, sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/api/health\").status == 200 else 1)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  asr:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      ASR_WS_HOST: 0.0.0.0
      ASR_WS_PORT: "8765"
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
    command: ["uv", "run", "python", "-m", "backend.asr.qwen_realtime", "--host", "0.0.0.0", "--port", "8765"]
    ports:
      - "${ASR_PORT:-9785}:8765"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:v1.9
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "${LIVEKIT_PORT:-7880}:7880"
      - "7882-7888:7882-7888"
      - "7882-7888:7882-7888/udp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7880 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  egress:
    image: livekit/egress:v1.9
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress.yaml:ro
      - egress-output:/out
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
        VITE_ASR_WS_URL: ${VITE_ASR_WS_URL:-ws://127.0.0.1:9785/}
        VITE_ASR_PROVIDER: ${VITE_ASR_PROVIDER:-qwen}
        VITE_REQUIRE_AUTH: ${VITE_REQUIRE_AUTH:-false}
        VITE_INTERVIEW_FILLER_WORDS: ${VITE_INTERVIEW_FILLER_WORDS:-}
        VITE_APP_ENV: production
    depends_on:
      - backend
      - asr
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  egress-output:
