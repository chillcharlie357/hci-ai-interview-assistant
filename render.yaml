# Render Blueprint for the HCI interview MVP.
#
# Setup notes:
# - Import this file as a Render Blueprint.
# - This branch uses the GHCR tag `render-preview` so Render can deploy before
#   the workflow is merged to main. For production, switch these image URLs to
#   `:main` after the workflow is merged and the main image exists.
# - The backend/asr GHCR images use the Render registry credential named `hci`.
#   Keep that credential in sync with a GitHub token that has `read:packages`.
# - Keep secrets in the Render environment group `hci_env`. Link backend and ASR
#   to that group, and upload any multiline credentials as Secret Files there.
#   Non-sensitive production defaults are committed here.

services:
  - type: web
    runtime: image
    name: hci-ai-interview-backend
    plan: free
    region: singapore
    image:
      url: ghcr.io/chillcharlie357/hci-ai-interview-assistant-backend:render-preview
      creds:
        fromRegistryCreds:
          name: hci
    dockerCommand: uv run python -m backend.interview.api --host 0.0.0.0 --port 10000
    healthCheckPath: /api/health
    envVars:
      - fromGroup: hci_env
      - key: APP_ENV
        value: production
      - key: BACKEND_PORT
        value: "10000"
      - key: LOG_LEVEL
        value: INFO
      - key: REQUIRE_AUTH
        value: "true"
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com
      - key: OPENAI_MODEL
        value: deepseek-v4-flash
      - key: MINERU_TIMEOUT_SEC
        value: "300"
      - key: UV_DEFAULT_INDEX
        value: https://pypi.tuna.tsinghua.edu.cn/simple
      - key: LIVEKIT_URL
        value: wss://hci-ai-interview-7qgq6dgo.livekit.cloud
      - key: SUPABASE_URL
        value: https://qsovdddbiarmqyqsuqui.supabase.co
      - key: SUPABASE_CONNECT_TIMEOUT_SEC
        value: "5"

  - type: web
    runtime: image
    name: hci-ai-interview-asr
    plan: free
    region: singapore
    image:
      url: ghcr.io/chillcharlie357/hci-ai-interview-assistant-backend:render-preview
      creds:
        fromRegistryCreds:
          name: hci
    dockerCommand: uv run python -m backend.asr.qwen_realtime --host 0.0.0.0 --port 10000
    envVars:
      - fromGroup: hci_env
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ASR_WS_PORT
        value: "10000"
      - key: ASR_PORT
        value: "10000"
      - key: UV_DEFAULT_INDEX
        value: https://pypi.tuna.tsinghua.edu.cn/simple

  - type: web
    runtime: static
    name: hci-ai-interview-frontend
    buildCommand: cd frontend && pnpm install --frozen-lockfile --ignore-scripts && pnpm build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_PORT
        value: "443"
      - key: VITE_APP_ENV
        value: production
      - key: VITE_LOG_LEVEL
        value: info
      - key: VITE_REQUIRE_AUTH
        value: "true"
      - key: VITE_ASR_PROVIDER
        value: qwen
      - key: VITE_INTERVIEW_FILLER_WORDS
        value: 嗯,啊,呃,额,那个,就是
      - key: VITE_API_BASE_URL
        value: https://hci-ai-interview-backend-k9ic.onrender.com
      - key: VITE_ASR_WS_URL
        value: wss://hci-ai-interview-asr-k9ic.onrender.com/
