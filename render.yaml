# Render Blueprint for the HCI interview MVP.
#
# Setup notes:
# - Import this file as a Render Blueprint.
# - This branch uses the GHCR tag `render-preview` so Render can deploy before
#   the workflow is merged to main. For production, switch these image URLs to
#   `:main` after the workflow is merged and the main image exists.
# - The backend/asr GHCR images use the Render registry credential named `hci`.
#   Keep that credential in sync with a GitHub token that has `read:packages`.
# - Fill all `sync: false` values in the Render Dashboard after creation.

services:
  - type: web
    runtime: image
    name: hci-ai-interview-backend
    plan: free
    region: singapore
    image:
      url: ghcr.io/chillcharlie357/hci-ai-interview-assistant-backend:render-preview
      creds:
        fromRegistryCreds:
          name: hci
    dockerCommand: uv run python -m backend.interview.api --host 0.0.0.0 --port 10000
    healthCheckPath: /api/health
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: REQUIRE_AUTH
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        sync: false
      - key: MINERU_API_TOKEN
        sync: false
      - key: MINERU_TIMEOUT_SEC
        value: "300"

  - type: web
    runtime: image
    name: hci-ai-interview-asr
    plan: free
    region: singapore
    image:
      url: ghcr.io/chillcharlie357/hci-ai-interview-assistant-backend:render-preview
      creds:
        fromRegistryCreds:
          name: hci
    dockerCommand: uv run python -m backend.asr.qwen_realtime --host 0.0.0.0 --port 10000
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: DASHSCOPE_API_KEY
        sync: false

  - type: web
    runtime: static
    name: hci-ai-interview-frontend
    buildCommand: cd frontend && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_APP_ENV
        value: production
      - key: VITE_LOG_LEVEL
        value: info
      - key: VITE_REQUIRE_AUTH
        value: "false"
      - key: VITE_ASR_PROVIDER
        value: qwen
      - key: VITE_INTERVIEW_FILLER_WORDS
        value: 嗯,啊,呃,额,那个,就是
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ASR_WS_URL
        sync: false
